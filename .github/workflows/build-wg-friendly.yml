name: Build wg-friendly for 25.12

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 25.12

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENWRT_REF: openwrt-25.12
      FEED_PATH: feed-repo
      REPO_PACKAGES_DIR: repo/packages

    steps:
      - name: Checkout feed repo
        uses: actions/checkout@v4
        with:
          path: ${{ env.FEED_PATH }}

      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_REF }}
          path: openwrt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential libncurses5-dev gawk gettext unzip file python3 python3-distutils apk-tools

      - name: Add feed and update
        run: |
          cd openwrt
          echo "src-git myfeed ../${{ env.FEED_PATH }};25.12" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build package wg-friendly
        run: |
          cd openwrt
          make package/wg-friendly/compile V=s

      - name: Collect .apk artifacts
        run: |
          cd openwrt
          mkdir -p ../${{ env.REPO_PACKAGES_DIR }}
          # Kopiere alle .apk aus bin/packages in repo/packages
          find bin/packages -type f -name "*.apk" -exec cp --parents {} ../${{ env.REPO_PACKAGES_DIR }} \; || true
          ls -la ../${{ env.REPO_PACKAGES_DIR }} || true

      - name: Generate apk index packages.adb
        run: |
          cd ${{ env.REPO_PACKAGES_DIR }}
          if ls *.apk 1> /dev/null 2>&1; then
            apk index -o packages.adb *.apk
          else
            echo "No .apk files found"
          fi

      - name: Prepare gh-pages content
        run: |
          rm -rf ghpages_tmp || true
          mkdir -p ghpages_tmp
          cp -r ${{ env.REPO_PACKAGES_DIR }}/* ghpages_tmp/ || true
          touch ghpages_tmp/.nojekyll
          ls -la ghpages_tmp

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ghpages_tmp
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
