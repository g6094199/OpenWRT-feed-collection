name: Build and Deploy APK Feed

on:
  workflow_dispatch: # Nur manueller Start über den Button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Feed
        uses: actions/checkout@v4

      - name: Create Feed Directory
        run: |
          mkdir -p openwrt_feed_collection
          [ -d net ] && cp -R net openwrt_feed_collection/
          [ -d utils ] && cp -R utils openwrt_feed_collection/

      - name: Build with SDK
        uses: openwrt/gh-action-sdk@main
        env:
          # Festgelegt auf x86_64 stabile Version
          ARCH: x86_64-23.05
          FEED_DIR: openwrt_feed_collection
          PACKAGES: wg-friendly
          INDEX: 1

      - name: Prepare Feed Directory
        run: |
          mkdir -p deploy/all
          # Kopiere die gebauten Pakete und den Index für GitHub Pages
          find bin/packages/ -name "wg-friendly*.apk" -exec cp {} deploy/all/ \;
          find bin/packages/ -name "packages.adb" -exec cp {} deploy/all/ \; || \
          find bin/packages/ -name "Packages*" -exec cp {} deploy/all/ \;
          
          echo "<h1>OpenWrt Feed Collection</h1><p>Manueller Build für x86_64 (AllArch Pakete)</p><p>Update: $(date)</p>" > deploy/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
