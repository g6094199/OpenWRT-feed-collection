name: Build wg-friendly and publish to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 25.12

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      OPENWRT_REF: openwrt-25.12
      FEED_PATH: feed-repo
      REPO_PACKAGES_DIR: repo/packages
      GHPAGES_BRANCH: gh-pages

    steps:
      - name: Checkout feed repo
        uses: actions/checkout@v4
        with:
          path: ${{ env.FEED_PATH }}

      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_REF }}
          path: openwrt

      - name: Install build dependencies (conditional)
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential libncurses5-dev gawk gettext unzip file python3 python3-pip
          # Versuche python3-distutils; bei neueren Ubuntu-Releases kann der Paketname variieren
          if ! sudo apt-get install -y python3-distutils; then
            sudo apt-get install -y python3.11-distutils python3.12-distutils || true
          fi
          # Hinweis: apk-tools ist auf ubuntu-latest oft nicht verfügbar; wir erzeugen den Index später in einem Alpine-Container

      - name: Add feed and update
        run: |
          cd openwrt
          echo "src-git myfeed ../${{ env.FEED_PATH }};25.12" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build package wg-friendly
        run: |
          cd openwrt
          make package/wg-friendly/compile V=s

      - name: Collect .apk artifacts
        run: |
          cd openwrt
          mkdir -p ../${{ env.REPO_PACKAGES_DIR }}
          find bin/packages -type f -name "*.apk" -exec cp {} ../${{ env.REPO_PACKAGES_DIR }}/ \; || true
          ls -la ../${{ env.REPO_PACKAGES_DIR }} || true

      - name: Generate apk index (Alpine container fallback)
        run: |
          cd repo/packages
          if ls *.apk 1> /dev/null 2>&1; then
            # Versuche lokal apk index; falls nicht vorhanden, nutze Alpine Docker-Container
            if command -v apk >/dev/null 2>&1; then
              apk index -o packages.adb *.apk
            else
              echo "apk not found on runner, using Alpine container to generate packages.adb"
              docker run --rm -v "$PWD":/work -w /work alpine:3.18 sh -c "apk index -o packages.adb *.apk"
            fi
            ls -la packages.adb
          else
            echo "No .apk files found"
          fi

      - name: Prepare gh-pages content
        run: |
          rm -rf ghpages_tmp || true
          mkdir -p ghpages_tmp
          cp -r repo/packages/* ghpages_tmp/ || true
          touch ghpages_tmp/.nojekyll
          ls -la ghpages_tmp

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ghpages_tmp
          publish_branch: ${{ env.GHPAGES_BRANCH }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
