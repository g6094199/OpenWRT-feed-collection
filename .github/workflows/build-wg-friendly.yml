name: Build wg-friendly APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Feed
        uses: actions/checkout@v4

      - name: Build with SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-25.12
          FEED_DIR: openwrt_feed_collection
          PACKAGES: wg-friendly

      - name: Collect APKs
        run: |
          mkdir -p bin/output
          find bin/packages/ -name "*.apk" -exec cp {} bin/output/ \;
          find bin/packages/ -name "packages.adb" -exec cp {} bin/output/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wg-friendly-package-x86_64
          path: bin/output/*
