name: Build wg-friendly for 25.12

on:
  push:
    branches: [ "25.12", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feed repo
        uses: actions/checkout@v4
        with:
          path: feed-repo

      - name: Checkout OpenWrt source (25.12)
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt

      - name: Copy feed into OpenWrt feeds
        run: |
          cd openwrt
          echo "src-git myfeed ../feed-repo" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk gettext unzip file python3 python3-distutils

      - name: Build package wg-friendly
        run: |
          cd openwrt
          make package/wg-friendly/compile V=s

      - name: Collect .apk artifacts
        run: |
          cd openwrt
          mkdir -p ../repo/packages
          # Suche nach erzeugten apk Dateien (OpenWrt 25.12 erzeugt .apk in bin/packages/<arch>/)
          find bin/packages -name "*.apk" -exec cp {} ../repo/packages/ \; || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wg-friendly-apks
          path: repo/packages

